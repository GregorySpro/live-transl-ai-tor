<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>live-transl-ai-tor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #f4f4f4;
    --win:    #ffffff;
    --border: #e0e0e0;
    --text:   #111111;
    --mid:    #666666;
    --muted:  #b8b8b8;
    --track:  #e8e8e8;
    --fill:   #111111;
    --err:    #c0392b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:    #0d0d0d; --win: #141414; --border: #2a2a2a;
      --text:  #f0f0f0; --mid: #888;    --muted:  #3a3a3a;
      --track: #2a2a2a; --fill: #f0f0f0;
    }
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI Variable Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .win {
    width: 380px;
    background: var(--win);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  /* barre de titre */
  .titlebar {
    height: 34px;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-app-region: drag;
  }
  .tb-title {
    font-size: 12px;
    color: var(--mid);
    letter-spacing: .01em;
  }
  .tb-dots {
    position: absolute;
    left: 14px;
    display: flex;
    gap: 5px;
  }
  .tb-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border);
  }

  /* corps */
  .body { padding: 26px 28px 24px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .heading {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -.02em;
    line-height: 1.3;
    margin-bottom: 22px;
  }

  /* étapes */
  .steps { display: flex; flex-direction: column; }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    transition: opacity .2s;
  }
  .step:last-child { border-bottom: none; }
  .step-n {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    width: 18px;
    flex-shrink: 0;
  }
  .step-name {
    font-size: 13px;
    color: var(--mid);
    flex: 1;
    transition: color .2s;
  }
  .step-state {
    font-size: 12px;
    color: var(--muted);
    width: 14px;
    text-align: right;
    flex-shrink: 0;
  }

  .step.done .step-name  { color: var(--muted); text-decoration: line-through; }
  .step.active .step-name{ color: var(--text); font-weight: 500; }
  .step.active .step-n   { color: var(--text); }
  .step.active .step-state{ color: var(--text); font-size: 10px; }

  /* progression */
  .progress-area { margin-top: 22px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .progress-status { font-size: 12px; color: var(--mid); }
  .progress-pct    { font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }

  .track { height: 2px; background: var(--track); border-radius: 99px; overflow: hidden; }
  .fill  {
    height: 100%;
    background: var(--fill);
    border-radius: 99px;
    width: 0%;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* bouton */
  .btn {
    display: none;
    width: 100%;
    margin-top: 18px;
    padding: 10px 0;
    background: var(--text);
    color: var(--win);
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: opacity .15s;
    -webkit-app-region: no-drag;
  }
  .btn:hover { opacity: .78; }
  .btn.show  { display: block; }

  /* erreur */
  .error-box {
    display: none;
    margin-top: 16px;
    padding: 10px 12px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 4px;
    font-size: 12px;
    color: var(--err);
    line-height: 1.5;
    word-break: break-word;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="win">
  <div class="titlebar">
    <div class="tb-dots">
      <div class="tb-dot"></div>
      <div class="tb-dot"></div>
      <div class="tb-dot"></div>
    </div>
    <span class="tb-title">live-transl-ai-tor</span>
  </div>

  <div class="body">
    <div class="eyebrow">Première utilisation</div>
    <div class="heading" id="heading">Mise en place de<br>votre application</div>

    <div class="steps" id="steps-list"></div>

    <div class="progress-area">
      <div class="progress-meta">
        <span class="progress-status" id="status">Démarrage…</span>
        <span class="progress-pct" id="pct">0 %</span>
      </div>
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>

    <div class="error-box" id="error-box"></div>
    <button class="btn" id="btn-launch" onclick="launch()">Ouvrir l'application</button>
  </div>
</div>

<script>
let _steps = [];
let _cur   = -1;

function initSteps(labels) {
  _steps = labels;
  const c = document.getElementById('steps-list');
  c.innerHTML = '';
  labels.forEach((lbl, i) => {
    const div = document.createElement('div');
    div.className = 'step waiting';
    div.id = 'step-' + i;

    const n = document.createElement('span');
    n.className = 'step-n';
    n.textContent = String(i + 1).padStart(2, '0');

    const name = document.createElement('span');
    name.className = 'step-name';
    name.textContent = lbl;

    const state = document.createElement('span');
    state.className = 'step-state';
    state.id = 'step-state-' + i;

    div.append(n, name, state);
    c.appendChild(div);
  });
}

function setStep(i) {
  // Terminer le précédent
  if (_cur >= 0) {
    const prev = document.getElementById('step-' + _cur);
    if (prev) {
      prev.className = 'step done';
      const s = document.getElementById('step-state-' + _cur);
      if (s) s.textContent = '✓';
    }
  }
  _cur = i;
  const cur = document.getElementById('step-' + i);
  if (cur) {
    cur.className = 'step active';
    const s = document.getElementById('step-state-' + i);
    if (s) s.textContent = '·';
  }
}

function setProgress(pct, status) {
  document.getElementById('fill').style.width = pct + '%';
  document.getElementById('pct').textContent  = pct + ' %';
  document.getElementById('status').textContent = status;
}

function showDone() {
  // Marquer toutes les étapes comme terminées
  _steps.forEach((_, i) => {
    const el = document.getElementById('step-' + i);
    if (el) el.className = 'step done';
    const s = document.getElementById('step-state-' + i);
    if (s) s.textContent = '✓';
  });
  document.getElementById('heading').textContent = 'Prêt.';
  document.getElementById('btn-launch').classList.add('show');
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = 'Erreur : ' + msg;
  box.classList.add('show');
  document.getElementById('status').textContent = 'Échec';
}

function launch() {
  window.pywebview.api.launch();
}
</script>
</body>
</html>
