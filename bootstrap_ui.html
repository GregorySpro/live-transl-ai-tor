<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>live-transl-ai-tor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Segoe UI Variable Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-app-region: drag;
  }

  .card {
    width: 400px;
    background: #111;
    border: none;
    border-radius: 8px;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }

  .titlebar {
    height: 36px;
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 14px;
    position: relative;
    -webkit-app-region: drag;
  }
  .tb-dots { display: flex; gap: 6px; -webkit-app-region: no-drag; }
  .tb-dot  { width: 11px; height: 11px; border-radius: 50%; background: #2a2a2a; }
  .tb-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #444; letter-spacing: .01em; pointer-events: none;
  }

  .body { padding: 28px 30px 26px; }

  .eyebrow {
    font-size: 11px; font-weight: 500; color: #444;
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px;
  }
  .heading {
    font-size: 17px; font-weight: 500; color: #f0f0f0;
    letter-spacing: -.02em; line-height: 1.3; margin-bottom: 24px;
  }

  .steps { display: flex; flex-direction: column; }
  .step { display: flex; align-items: center; gap: 14px; padding: 9px 0; border-bottom: 1px solid #1a1a1a; }
  .step:last-child { border-bottom: none; }
  .step-n    { font-size: 11px; color: #2e2e2e; font-variant-numeric: tabular-nums; width: 18px; flex-shrink: 0; }
  .step-name { font-size: 13px; color: #3a3a3a; flex: 1; transition: color .2s; }
  .step-state{ font-size: 12px; color: #2e2e2e; width: 14px; text-align: right; flex-shrink: 0; }

  .step.done .step-name  { color: #2e2e2e; text-decoration: line-through; text-decoration-color: #252525; }
  .step.done .step-n     { color: #2e2e2e; }
  .step.active .step-n   { color: #f0f0f0; }
  .step.active .step-name{ color: #f0f0f0; font-weight: 500; }
  .step.active .step-state{ color: #f0f0f0; font-size: 10px; }

  .progress-area { margin-top: 22px; }
  .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-status { font-size: 12px; color: #444; }
  .progress-pct    { font-size: 12px; color: #f0f0f0; font-variant-numeric: tabular-nums; font-weight: 500; }
  .track { height: 1.5px; background: #1e1e1e; border-radius: 99px; overflow: hidden; }
  .fill  { height: 100%; background: #f0f0f0; border-radius: 99px; width: 0%; transition: width .5s cubic-bezier(.4,0,.2,1); }

  .btn {
    display: none; width: 100%; margin-top: 20px; padding: 11px 0;
    background: #f0f0f0; color: #111; border: none; border-radius: 4px;
    font-size: 13px; font-weight: 500; font-family: inherit;
    letter-spacing: -.01em; cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn.show  { display: block; }

  .error-box {
    display: none; margin-top: 14px; padding: 10px 12px;
    border: 1px solid #3f1515; border-radius: 4px; background: #1a0a0a;
    font-size: 12px; color: #f87171; line-height: 1.5; word-break: break-word;
  }
  .error-box.show { display: block; }

  .note { margin-top: 16px; font-size: 11px; color: #2e2e2e; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="titlebar">
    <div class="tb-dots">
      <div class="tb-dot"></div><div class="tb-dot"></div><div class="tb-dot"></div>
    </div>
    <span class="tb-title">live-transl-ai-tor</span>
  </div>
  <div class="body">
    <div class="eyebrow">Première utilisation</div>
    <div class="heading" id="heading">Mise en place de<br>votre application</div>
    <div class="steps" id="steps-list"></div>
    <div class="progress-area">
      <div class="progress-meta">
        <span class="progress-status" id="status">Démarrage…</span>
        <span class="progress-pct" id="pct">0 %</span>
      </div>
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>
    <div class="error-box" id="error-box"></div>
    <button class="btn" id="btn-launch" onclick="launch()">Ouvrir l'application</button>
    <p class="note">Cette configuration n'a lieu qu'une seule fois.</p>
  </div>
</div>

<script>
let _cur = -1, _total = 0;

function initSteps(labels) {
  _total = labels.length;
  const c = document.getElementById('steps-list'); c.innerHTML = '';
  labels.forEach((lbl, i) => {
    const div = document.createElement('div'); div.className='step'; div.id='step-'+i;
    const n = document.createElement('span'); n.className='step-n'; n.textContent=String(i+1).padStart(2,'0');
    const name = document.createElement('span'); name.className='step-name'; name.textContent=lbl;
    const state = document.createElement('span'); state.className='step-state'; state.id='step-state-'+i;
    div.append(n,name,state); c.appendChild(div);
  });
}

function setStep(i) {
  if (_cur >= 0) {
    const p = document.getElementById('step-'+_cur); if(p) p.className='step done';
    const ps = document.getElementById('step-state-'+_cur); if(ps) ps.textContent='✓';
  }
  _cur = i;
  const el = document.getElementById('step-'+i); if(el) el.className='step active';
  const es = document.getElementById('step-state-'+i); if(es) es.textContent='·';
}

function setProgress(pct, status) {
  document.getElementById('fill').style.width = pct+'%';
  document.getElementById('pct').textContent   = pct+' %';
  document.getElementById('status').textContent = status;
}

function showDone() {
  for(let i=0;i<_total;i++){
    const el=document.getElementById('step-'+i); if(el) el.className='step done';
    const s=document.getElementById('step-state-'+i); if(s) s.textContent='✓';
  }
  document.getElementById('heading').innerHTML='Prêt.';
  document.getElementById('btn-launch').classList.add('show');
}

function showError(msg) {
  const b=document.getElementById('error-box'); b.textContent='Erreur : '+msg; b.classList.add('show');
  document.getElementById('status').textContent='Échec';
}

function launch() { window.pywebview.api.launch(); }
</script>
</body>
</html>
